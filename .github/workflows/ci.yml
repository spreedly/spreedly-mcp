name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit for critical and high vulnerabilities
        run: npm audit --audit-level=high

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for potential secrets
        run: |
          # Fail if any file contains patterns that look like real Spreedly tokens
          # Real environment keys are 20+ char alphanumeric strings
          # This is a basic check -- GitHub's built-in secret scanning covers the rest
          if grep -rn --include='*.ts' --include='*.json' --include='*.env' \
            -E '(SPREEDLY_ENVIRONMENT_KEY|SPREEDLY_ACCESS_SECRET)\s*[=:]\s*"[A-Za-z0-9]{20,}"' \
            --exclude-dir=node_modules --exclude-dir=dist .; then
            echo "::error::Potential real credentials detected in source files"
            exit 1
          fi
          echo "No credential patterns found"
