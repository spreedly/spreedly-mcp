name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Audit for critical and high vulnerabilities
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Create package tarball
        id: pack
        run: |
          echo "=== Package contents ==="
          npm pack --dry-run
          echo ""
          TARBALL=$(npm pack)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Scan package tarball for secrets
        id: gitleaks
        continue-on-error: true
        env:
          GITLEAKS_VERSION: "8.30.0"
        run: |
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          chmod +x gitleaks

          # Extract tarball — scan exactly what customers receive
          mkdir -p /tmp/pkg-scan
          tar xzf "${{ steps.pack.outputs.tarball }}" -C /tmp/pkg-scan

          # Scan in filesystem mode (--no-git): covers dist/ which GHAS never sees
          ./gitleaks detect --source /tmp/pkg-scan --no-git --verbose --report-format sarif --report-path gitleaks-results.sarif

      - name: Upload gitleaks SARIF report
        if: always() && hashFiles('gitleaks-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks-release

      - name: Fail if secrets detected
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Secrets detected in package tarball — blocking release"
          exit 1

      - name: Generate SBOM (CycloneDX)
        run: |
          npm sbom --sbom-format cyclonedx --sbom-type library --omit dev > sbom.cdx.json
          jq -e '.bomFormat == "CycloneDX" and .specVersion and (.components | length > 0)' sbom.cdx.json > /dev/null

      - name: Generate SHA-256 checksums
        run: sha256sum "${{ steps.pack.outputs.tarball }}" sbom.cdx.json > SHA256SUMS.txt

      - name: Create draft GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft \
            "${{ steps.pack.outputs.tarball }}" \
            SHA256SUMS.txt \
            sbom.cdx.json
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
